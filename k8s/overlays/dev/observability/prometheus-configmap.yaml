apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: loja-service
        metrics_path: /api/loja/actuator/prometheus
        static_configs:
          - targets:
              - loja-service.loja.svc.cluster.local:8080

      - job_name: keycloak
        metrics_path: /metrics
        static_configs:
          - targets:
              - keycloak.loja.svc.cluster.local:8080
