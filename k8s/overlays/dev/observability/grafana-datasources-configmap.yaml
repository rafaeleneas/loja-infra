apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: PROME
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
