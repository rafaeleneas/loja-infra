apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loja-service-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: loja-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: LOJA_SERVICE_INTRACLIENT_SECRET
      remoteRef:
        key: loja/hmg/loja-service
        property: LOJA_SERVICE_INTRACLIENT_SECRET
