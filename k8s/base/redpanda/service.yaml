apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      protocol: TCP
      port: 9092
      targetPort: 9092
    - name: proxy
      protocol: TCP
      port: 8082
      targetPort: 8082
    - name: admin
      protocol: TCP
      port: 9644
      targetPort: 9644
  type: ClusterIP
