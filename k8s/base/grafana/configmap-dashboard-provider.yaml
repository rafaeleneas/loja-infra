apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: loja-dev
        orgId: 1
        folder: Loja Dev
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
