name: Loja Service GitOps

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Environment to update
        required: true
        default: hmg
        type: choice
        options:
          - hmg
          - prd
      image:
        description: Full image URI to apply
        required: true
        type: string
      image_tag:
        description: Image tag or source commit SHA
        required: false
        type: string
  repository_dispatch:
    types:
      - loja-service-image-published

concurrency:
  group: gitops-loja-service-${{ github.event.client_payload.environment || inputs.deploy_environment || 'manual' }}
  cancel-in-progress: false

env:
  IMAGE_NAME_IN_MANIFEST: loja-service:local

permissions:
  contents: write

jobs:
  update-loja-service-manifest:
    name: Update Loja Service Deployment Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Resolve deployment target
        id: deploy-target
        env:
          DEPLOY_ENV: ${{ github.event.client_payload.environment || inputs.deploy_environment }}
          PUBLISHED_IMAGE: ${{ github.event.client_payload.image || inputs.image }}
          IMAGE_TAG: ${{ github.event.client_payload.sha || inputs.image_tag }}
        run: |
          if [ -z "$DEPLOY_ENV" ]; then
            echo "::error::Deployment environment was not provided."
            exit 1
          fi

          if [ -z "$PUBLISHED_IMAGE" ]; then
            echo "::error::Published image was not provided."
            exit 1
          fi

          case "$DEPLOY_ENV" in
            hmg|prd)
              KUSTOMIZATION_PATH="k8s/overlays/${DEPLOY_ENV}/loja-service"
              ;;
            *)
              echo "::error::Unsupported deployment environment: $DEPLOY_ENV"
              exit 1
              ;;
          esac

          if [ ! -f "$KUSTOMIZATION_PATH/kustomization.yaml" ]; then
            echo "::error::Kustomization not found: $KUSTOMIZATION_PATH/kustomization.yaml"
            exit 1
          fi

          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="${PUBLISHED_IMAGE##*:}"
          fi

          echo "environment=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "image=$PUBLISHED_IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "kustomization_path=$KUSTOMIZATION_PATH" >> "$GITHUB_OUTPUT"

      - name: Update container image in kustomization
        env:
          KUSTOMIZATION_PATH: ${{ steps.deploy-target.outputs.kustomization_path }}
          PUBLISHED_IMAGE: ${{ steps.deploy-target.outputs.image }}
        run: |
          cd "$KUSTOMIZATION_PATH"
          kustomize edit set image "${{ env.IMAGE_NAME_IN_MANIFEST }}=${PUBLISHED_IMAGE}"

      - name: Commit GitOps change
        env:
          KUSTOMIZATION_PATH: ${{ steps.deploy-target.outputs.kustomization_path }}
          DEPLOY_ENV: ${{ steps.deploy-target.outputs.environment }}
          IMAGE_TAG: ${{ steps.deploy-target.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_PATH/kustomization.yaml"
          git commit -m "chore: update loja-service ${DEPLOY_ENV} image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
