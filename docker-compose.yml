services:
  loja-db:
    image: postgres:16
    container_name: loja-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: lojadb
      POSTGRES_USER: loja
      POSTGRES_PASSWORD: loja
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loja -d lojadb"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - loja-postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

  keycloak-db:
    image: postgres:16
    container_name: loja-keycloak-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: loja-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-extranet.json:/opt/keycloak/data/import/realm-extranet.json:ro
      - ./infra/keycloak/realm-intranet.json:/opt/keycloak/data/import/realm-intranet.json:ro

volumes:
  loja-postgres-data:
  keycloak-postgres-data:
