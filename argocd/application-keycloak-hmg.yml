apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-hmg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rafaeleneas/loja-infra.git
    targetRevision: HEAD
    path: k8s/overlays/hmg/keycloak
  destination:
    server: https://kubernetes.default.svc
    namespace: loja
  syncPolicy:
    automated:
      selfHeal: true
