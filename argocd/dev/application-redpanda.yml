apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redpanda-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/rafaeleneas/loja-infra.git
    targetRevision: HEAD
    path: k8s/overlays/dev/redpanda
  destination:
    server: https://kubernetes.default.svc
    namespace: loja
  syncPolicy:
    automated:
      selfHeal: true
