apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hmg-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rafaeleneas/loja-infra.git
    targetRevision: HEAD
    path: argocd/hmg
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
